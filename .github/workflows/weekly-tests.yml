name: Weekly WebView Tests

on:
  schedule:
    # Run every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      upload_results:
        description: 'Upload results to GitHub'
        required: false
        default: true
        type: boolean

jobs:
  test-android-webview:
    name: Android WebView
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-level: [29, 30, 33, 34]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Clone and build Android app
        run: |
          npm run setup:android-app
          cd apps/CanIAndroidWebView
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      
      - name: Run tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_5
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            adb install -r apps/CanIAndroidWebView/app/build/outputs/apk/debug/app-debug.apk
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            npm run test:android || true
      
      - name: Upload results to webview-bcd-results
        if: always() && (github.event_name == 'schedule' || inputs.upload_results == 'true')
        env:
          GITHUB_TOKEN: ${{ secrets.RESULTS_UPLOAD_TOKEN }}
        run: |
          if [ -f test-results/android-results.json ]; then
            npm run upload-results test-results/android-results.json
            echo "✅ Results uploaded for Android API ${{ matrix.api-level }}"
          else
            echo "⚠️  No results file found to upload"
          fi
      
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-api-${{ matrix.api-level }}-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30
  
  test-ios-webview:
    name: iOS WKWebView
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - ios-version: '17.2'
            xcode-version: '15.2'
          - ios-version: '17.4'
            xcode-version: '15.3'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Appium drivers
        run: npx appium driver install xcuitest
      
      - name: Clone iOS app
        run: npm run setup:ios-app
      
      - name: Select Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode-version }}.app/Contents/Developer
          xcodebuild -version
      
      - name: List available simulators
        run: xcrun simctl list devices available
      
      - name: Build iOS app
        run: |
          cd apps/CanIWKWebView
          xcodebuild -project CanIWKWebView.xcodeproj \
            -scheme CanIWKWebView \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Boot simulator and install app
        run: |
          SIMULATOR=$(xcrun simctl list devices available | grep "iPhone 15" | head -1 | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          echo "Using simulator: $SIMULATOR"
          xcrun simctl boot $SIMULATOR
          xcrun simctl install $SIMULATOR apps/CanIWKWebView/build/Build/Products/Debug-iphonesimulator/CanIWKWebView.app
          echo "SIMULATOR_UDID=$SIMULATOR" >> $GITHUB_ENV
      
      - name: Start Appium server
        run: |
          npx appium &
          sleep 5
      
      - name: Run tests
        run: npm run test:ios || true
      
      - name: Upload results to webview-bcd-results
        if: always() && (github.event_name == 'schedule' || inputs.upload_results == 'true')
        env:
          GITHUB_TOKEN: ${{ secrets.RESULTS_UPLOAD_TOKEN }}
        run: |
          if [ -f test-results/ios-results.json ]; then
            npm run upload-results test-results/ios-results.json
            echo "✅ Results uploaded for iOS ${{ matrix.ios-version }}"
          else
            echo "⚠️  No results file found to upload"
          fi
      
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-${{ matrix.ios-version }}-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30
  
  summarize-results:
    name: Summarize Results
    runs-on: ubuntu-latest
    needs: [test-android-webview, test-ios-webview]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results
      
      - name: Create summary
        run: |
          echo "# WebView Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date -u +"%Y-%m-%d %H:%M UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Android Results" >> $GITHUB_STEP_SUMMARY
          for dir in all-results/android-*; do
            if [ -d "$dir" ]; then
              api=$(basename "$dir" | sed 's/android-api-\([0-9]*\)-.*/\1/')
              if [ -f "$dir/test-results/android-results.json" ]; then
                echo "- ✅ API Level $api: Tests completed" >> $GITHUB_STEP_SUMMARY
              else
                echo "- ❌ API Level $api: No results" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## iOS Results" >> $GITHUB_STEP_SUMMARY
          for dir in all-results/ios-*; do
            if [ -d "$dir" ]; then
              version=$(basename "$dir" | sed 's/ios-\([0-9.]*\)-.*/\1/')
              if [ -f "$dir/test-results/ios-results.json" ]; then
                echo "- ✅ iOS $version: Tests completed" >> $GITHUB_STEP_SUMMARY
              else
                echo "- ❌ iOS $version: No results" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 View detailed results at: https://github.com/WebView-CG/webview-bcd-results" >> $GITHUB_STEP_SUMMARY
